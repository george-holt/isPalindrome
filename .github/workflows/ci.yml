name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  bazel:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm (corepack)
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            zip \
            unzip \
            python3-coverage \
            lcov

          arch=$(dpkg --print-architecture)
          case "$arch" in
            amd64)
              tinfo_url=http://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb
              ;;
            arm64)
              tinfo_url=http://ports.ubuntu.com/ubuntu-ports/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_arm64.deb
              ;;
            *)
              echo "unsupported arch for libtinfo5: $arch" >&2
              exit 1
              ;;
          esac

          wget -q -O /tmp/libtinfo5.deb "$tinfo_url"
          sudo apt-get install -y /tmp/libtinfo5.deb
          rm -f /tmp/libtinfo5.deb

      - name: Check bazel toolchain
        run: |
          echo "bazel path: $(command -v bazel || echo not-found)"
          echo "bazelisk path: $(command -v bazelisk || echo not-found)"
          bazelisk version || true
          bazel version || true

          if [[ -f .bazelversion ]]; then
            echo ".bazelversion contents:"
            cat .bazelversion
          else
            echo "No .bazelversion file found"
          fi

      - name: Install dotnet global tools (coverage)
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          dotnet tool install -g dotnet-coverage
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Mount Bazel disk cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-${{ runner.os }}-${{ hashFiles('.bazelversion', 'MODULE.bazel', 'Cargo.lock', 'src/nodejs/ispalindrome/pnpm-lock.yaml') }}
          restore-keys: |
            bazel-${{ runner.os }}-

      - name: Bazel test
        run: bazel test //...

      - name: Unified coverage (CLI tests + manifest acceptance)
        run: ./tools/bazel-coverage.sh

      - name: Collect Bazel test logs
        if: failure()
        run: |
          OP="$(bazel info output_path)"
          mkdir -p bazel-testlogs
          for d in "$OP"/*/testlogs; do
            if [[ -d "$d" ]]; then
              cp -a "$d" bazel-testlogs/
            fi
          done

      - name: Upload Bazel test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bazel-testlogs
          path: bazel-testlogs
          if-no-files-found: ignore
